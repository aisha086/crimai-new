{% extends "base.html" %}
{% block title %}Forgot Password — CrimAI{% endblock %}
{% block content %}
<div style="max-width:400px;margin:4rem auto;">
  <div class="card">
    <h2 style="margin-bottom:1rem;font-size:1.25rem;">Forgot Password</h2>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;">Contact your system administrator to reset your password.</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Back to Login</a>
  </div>
</div>
{% endblock %}
